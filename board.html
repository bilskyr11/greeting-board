<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח הברכות של צעירי מצפה אילן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #020617; }
        .corkboard { background-color: #090b11; }
        .sticky-note { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sticky-note:hover { transform: scale(1.04) rotate(0deg) !important; z-index: 10; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden corkboard">

    <!-- Header -->
    <header class="p-6 bg-gradient-to-r from-violet-600 via-pink-600 to-amber-500 text-white shadow-lg border-b border-pink-500 flex flex-col md:flex-row items-center justify-between gap-4 z-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
        <div class="absolute -bottom-10 left-10 w-40 h-40 bg-yellow-400/20 rounded-full blur-3xl pointer-events-none"></div>

        <div class="flex items-center gap-4 relative z-10">
            <div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white shadow-inner border border-white/30 animate-pulse">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide drop-shadow-md">לוח הברכות של צעירי מצפה אילן 🎉</h1>
                <p class="text-sm text-pink-100/90 mt-1 font-light">
                    שלחו הודעה בקבוצה שמתחילה ב-<strong class="text-yellow-300 font-bold">"ברכה:"</strong> והיא תופיע פה!
                </p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto relative z-10">
            <div class="relative w-full sm:w-64">
                <input type="text" id="searchInput" oninput="filterNotes()" placeholder="חפשי ברכה או מברך..." class="w-full bg-white/10 border border-white/20 text-white placeholder-white/60 text-sm rounded-xl py-2 px-10 focus:outline-none focus:ring-2 focus:ring-white/40">
                <i class="fa-solid fa-magnifying-glass absolute right-3.5 top-3 text-white/60 text-sm"></i>
            </div>
            <div class="flex items-center gap-2 bg-white/15 backdrop-blur-md border border-white/25 px-5 py-2.5 rounded-2xl text-sm text-white shadow-lg shrink-0">
                <div class="flex items-center gap-2 border-l border-white/20 pl-4">
                    <i class="fa-solid fa-sticky-note text-yellow-300 text-base"></i>
                    <span id="noteCount" class="font-bold text-lg">0</span> פתקיות
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-heart text-rose-300 text-base"></i>
                    <span id="totalReactions" class="font-bold text-lg">0</span> תגובות
                </div>
            </div>
        </div>
    </header>

    <div id="sandboxBanner" class="hidden bg-amber-500/10 border-b border-amber-500/20 text-amber-300 text-xs py-1.5 px-4 text-center font-normal">
        <i class="fa-solid fa-circle-info ml-1.5"></i>
        הלוח פועל כעת במצב הדמיה מקומי. בחיבור האמיתי הברכות יגיעו מהוואטסאפ!
    </div>

    <!-- Board Grid -->
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <div id="boardGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>
    </main>

    <footer class="p-4 bg-slate-950/40 text-center text-xs text-slate-500 border-t border-slate-900 font-medium">
        נבנה באהבה עבור צעירי מצפה אילן • לוח ברכות דינמי מחבר ומשמח
    </footer>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl" dir="rtl">
            <h2 class="text-xl font-bold text-slate-800 mb-4">עריכת ברכה</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 block mb-1">שם השולח</label>
                    <input id="editSender" type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 block mb-1">טקסט הברכה</label>
                    <textarea id="editText" rows="4" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 block mb-1">תמונה (אופציונלי)</label>
                    <input id="editImageUrl" type="text" placeholder="הדביקי כתובת תמונה..." class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 mb-2">
                    <div class="text-center text-slate-400 text-xs mb-2">— או העלי קובץ —</div>
                    <input id="editImageFile" type="file" accept="image/*" class="w-full text-sm text-slate-500 file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:bg-violet-50 file:text-violet-700 file:text-sm">
                    <div id="imagePreview" class="mt-2 hidden">
                        <img id="previewImg" src="" class="w-full h-32 object-cover rounded-lg" alt="תצוגה מקדימה">
                        <button onclick="clearImage()" class="mt-1 text-xs text-red-500 hover:text-red-700">הסר תמונה</button>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-5">
                <button onclick="saveEdit()" class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-semibold py-2 rounded-xl transition-all">שמור</button>
                <button onclick="closeEditModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 rounded-xl transition-all">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const colorClasses = {
            yellow: { bg: 'bg-amber-100 border-t-4 border-amber-400 border-x border-b border-amber-400/10 shadow-[0_0_20px_rgba(251,191,36,0.15)]', pin: 'text-red-500', rotation: '-1.5deg' },
            blue:   { bg: 'bg-sky-100 border-t-4 border-sky-400 border-x border-b border-sky-400/10 shadow-[0_0_20px_rgba(56,189,248,0.15)]', pin: 'text-blue-500', rotation: '1deg' },
            pink:   { bg: 'bg-rose-100 border-t-4 border-rose-400 border-x border-b border-rose-400/10 shadow-[0_0_20px_rgba(244,63,94,0.15)]', pin: 'text-rose-500', rotation: '-1deg' },
            green:  { bg: 'bg-emerald-100 border-t-4 border-emerald-400 border-x border-b border-emerald-400/10 shadow-[0_0_20px_rgba(52,211,153,0.15)]', pin: 'text-emerald-500', rotation: '1.5deg' },
            purple: { bg: 'bg-purple-100 border-t-4 border-purple-400 border-x border-b border-purple-400/10 shadow-[0_0_20px_rgba(192,132,252,0.15)]', pin: 'text-violet-500', rotation: '-0.5deg' }
        };

        let greetings = [];
        let editingId = null;

        const mockGreetings = [
            { id: 101, sender: "משפחת כהן", text: "עומר ודנה היקרים!\nהמון מזל טוב על החתונה המרגשת שלכם! 🎉💍❤️", colorKey: "yellow", image: null, reactions: { heart: 14, like: 8, party: 5 }, date: "14:15" },
            { id: 102, sender: "יעל", text: "שיר! כל הכבוד על סיום הקורס! המון בהצלחה בהמשך! 💪🎓", colorKey: "purple", image: null, reactions: { heart: 9, like: 12, party: 4 }, date: "11:30" },
            { id: 103, sender: "איתי ותמר", text: "מזל טוב ענק על קבלת הרישיון! 🚗✨", colorKey: "green", image: null, reactions: { heart: 5, like: 19, party: 2 }, date: "18:45" }
        ];

        function isSimulatorMode() {
            return window.location.protocol === 'file:' || window.location.protocol === 'blob:' || window.location.hostname === '';
        }

        async function fetchGreetings() {
            if (isSimulatorMode()) {
                document.getElementById('sandboxBanner').classList.remove('hidden');
                const stored = localStorage.getItem('local_greetings');
                greetings = stored ? JSON.parse(stored) : [...mockGreetings];
                if (!stored) localStorage.setItem('local_greetings', JSON.stringify(greetings));
                renderBoard(greetings);
                return;
            }
            try {
                const response = await fetch('/api/greetings');
                greetings = await response.json();
                renderBoard(greetings);
            } catch (err) {
                document.getElementById('sandboxBanner').classList.remove('hidden');
                greetings = JSON.parse(localStorage.getItem('local_greetings') || JSON.stringify(mockGreetings));
                renderBoard(greetings);
            }
        }

        function renderBoard(itemsToRender) {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            let totalReacts = 0;

            if (itemsToRender.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500"><i class="fa-regular fa-folder-open text-4xl mb-3 block"></i><p class="text-base">הלוח עדיין ריק. שלחו ברכה ראשונה בוואטסאפ!</p></div>`;
                document.getElementById('noteCount').innerText = "0";
                document.getElementById('totalReactions').innerText = "0";
                return;
            }

            itemsToRender.forEach(note => {
                const colorConfig = colorClasses[note.colorKey] || colorClasses.yellow;
                totalReacts += note.reactions.heart + note.reactions.like + note.reactions.party;

                const card = document.createElement('div');
                card.className = `sticky-note ${colorConfig.bg} rounded-xl p-5 relative flex flex-col justify-between min-h-[220px] select-none border-b border-black/5`;
                card.style.transform = `rotate(${colorConfig.rotation})`;

                const safeText = note.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const safeSender = note.sender.replace(/</g, '&lt;').replace(/>/g, '&gt;');

                card.innerHTML = `
                    <div class="absolute -top-3.5 left-1/2 transform -translate-x-1/2 z-10">
                        <i class="fa-solid fa-thumbtack ${colorConfig.pin} text-2xl drop-shadow-md"></i>
                    </div>
                    <div class="mb-4 flex-1 flex flex-col justify-between">
                        <div>
                            ${note.image ? `<div class="w-full h-36 overflow-hidden rounded-lg mb-3 shadow-inner"><img src="${note.image}" class="w-full h-full object-cover pointer-events-none" alt="ברכה" onerror="this.parentElement.style.display='none'"></div>` : ''}
                            <p class="text-slate-800 leading-relaxed text-[15px] font-normal whitespace-pre-line">${safeText}</p>
                        </div>
                        <div class="flex items-center justify-between text-[11px] text-slate-500/80 mt-3 border-t border-black/5 pt-2 font-normal">
                            <span>מאת: ${safeSender}</span>
                            <span>${note.date}</span>
                        </div>
                    </div>
                    <div class="border-t border-black/5 pt-3 mt-auto flex items-center justify-between">
                        <div class="flex gap-2">
                            <button onclick="addReaction(${note.id}, 'heart')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-rose-600 transition-all shadow-sm active:scale-90">❤️ <span class="text-slate-700 font-bold">${note.reactions.heart}</span></button>
                            <button onclick="addReaction(${note.id}, 'like')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-amber-600 transition-all shadow-sm active:scale-90">👍 <span class="text-slate-700 font-bold">${note.reactions.like}</span></button>
                            <button onclick="addReaction(${note.id}, 'party')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-purple-600 transition-all shadow-sm active:scale-90">🎉 <span class="text-slate-700 font-bold">${note.reactions.party}</span></button>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="openEditModal(${note.id})" class="flex items-center justify-center w-8 h-8 rounded-full bg-white/70 hover:bg-blue-100 text-slate-400 hover:text-blue-500 transition-all shadow-sm active:scale-90" title="ערוך ברכה">
                                <i class="fa-solid fa-pen text-xs"></i>
                            </button>
                            <button onclick="deleteGreeting(${note.id})" class="flex items-center justify-center w-8 h-8 rounded-full bg-white/70 hover:bg-red-100 text-slate-400 hover:text-red-500 transition-all shadow-sm active:scale-90" title="מחק ברכה">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('noteCount').innerText = itemsToRender.length;
            document.getElementById('totalReactions').innerText = totalReacts;
        }

        async function addReaction(noteId, reactionType) {
            if (isSimulatorMode()) {
                greetings = greetings.map(note => {
                    if (note.id === noteId) note.reactions[reactionType]++;
                    return note;
                });
                localStorage.setItem('local_greetings', JSON.stringify(greetings));
                renderBoard(greetings);
                return;
            }
            try {
                const response = await fetch(`/api/greetings/${noteId}/react`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: reactionType })
                });
                if (response.ok) fetchGreetings();
            } catch (err) { console.error(err); }
        }

        async function deleteGreeting(noteId) {
            const password = prompt('הכניסי סיסמת מנהל למחיקה:');
            if (!password) return;
            if (isSimulatorMode()) {
                greetings = greetings.filter(g => g.id !== noteId);
                localStorage.setItem('local_greetings', JSON.stringify(greetings));
                renderBoard(greetings);
                return;
            }
            try {
                const response = await fetch(`/api/greetings/${noteId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (response.ok) {
                    fetchGreetings();
                } else {
                    alert('סיסמה שגויה ❌');
                }
            } catch (err) { console.error(err); }
        }

        function openEditModal(noteId) {
            const note = greetings.find(g => g.id === noteId);
            if (!note) return;
            editingId = noteId;
            document.getElementById('editSender').value = note.sender;
            document.getElementById('editText').value = note.text;
            document.getElementById('editImageUrl').value = note.image || '';
            document.getElementById('editImageFile').value = '';
            const preview = document.getElementById('imagePreview');
            if (note.image) {
                document.getElementById('previewImg').src = note.image;
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            editingId = null;
            document.getElementById('editModal').classList.add('hidden');
        }

        function clearImage() {
            document.getElementById('editImageUrl').value = '';
            document.getElementById('editImageFile').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
        }

        document.getElementById('editImageFile').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('editImageUrl').addEventListener('input', function() {
            if (this.value) {
                document.getElementById('previewImg').src = this.value;
                document.getElementById('imagePreview').classList.remove('hidden');
            } else {
                document.getElementById('imagePreview').classList.add('hidden');
            }
        });

        async function saveEdit() {
            if (!editingId) return;
            const sender = document.getElementById('editSender').value.trim();
            const text = document.getElementById('editText').value.trim();
            let imageUrl = document.getElementById('editImageUrl').value.trim() || null;
            const imageFile = document.getElementById('editImageFile').files[0];

            if (imageFile && !isSimulatorMode()) {
                const formData = new FormData();
                formData.append('image', imageFile);
                try {
                    const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
                    const uploadData = await uploadRes.json();
                    imageUrl = uploadData.url;
                } catch (err) { console.error('שגיאה בהעלאת תמונה:', err); }
            }

            if (isSimulatorMode()) {
                greetings = greetings.map(g => g.id === editingId ? { ...g, sender, text, image: imageUrl } : g);
                localStorage.setItem('local_greetings', JSON.stringify(greetings));
                renderBoard(greetings);
                closeEditModal();
                return;
            }

            try {
                await fetch(`/api/greetings/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender, text, image: imageUrl })
                });
                fetchGreetings();
                closeEditModal();
            } catch (err) { console.error(err); }
        }

        function filterNotes() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) { renderBoard(greetings); return; }
            renderBoard(greetings.filter(note =>
                note.sender.toLowerCase().includes(query) || note.text.toLowerCase().includes(query)
            ));
        }

        if (!isSimulatorMode()) setInterval(fetchGreetings, 3000);
        window.onload = fetchGreetings;
    </script>
</body>
</html>
