<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח הברכות של צעירי מצפה אילן</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts - Rubik for Hebrew -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght=300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #020617; /* Very dark slate-950 background */
        }
        
        /* Smooth flat modern dark background for maximum contrast */
        .corkboard {
            background-color: #090b11; /* Premium deep charcoal black */
        }

        /* Sticky note custom tilts for realism and beautiful shadows */
        .sticky-note {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sticky-note:hover {
            transform: scale(1.04) rotate(0deg) !important;
            z-index: 10;
        }

        /* Custom scrollbar for beautiful UI */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden corkboard">

    <!-- Festive Board Header -->
    <header class="p-6 bg-gradient-to-r from-violet-600 via-pink-600 to-amber-500 text-white shadow-lg border-b border-pink-500 flex flex-col md:flex-row items-center justify-between gap-4 z-10 relative overflow-hidden">
        <!-- Sparkle/Confetti decorative absolute shapes -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
        <div class="absolute -bottom-10 left-10 w-40 h-40 bg-yellow-400/20 rounded-full blur-3xl pointer-events-none"></div>

        <div class="flex items-center gap-4 relative z-10">
            <div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white shadow-inner border border-white/30 animate-pulse">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide drop-shadow-md">לוח הברכות של צעירי מצפה אילן 🎉</h1>
                <p class="text-sm text-pink-100/90 mt-1 font-light">
                    שלחו הודעה בקבוצה שמתחילה ב-<strong class="text-yellow-300 font-bold">"ברכה:"</strong> או <strong class="text-yellow-300 font-bold">"ברכה "</strong> והיא תופיע פה בשנייה הזו!
                </p>
            </div>
        </div>
        
        <!-- Search and Filter (To handle massive amount of notes) -->
        <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto relative z-10">
            <div class="relative w-full sm:w-64">
                <input type="text" id="searchInput" oninput="filterNotes()" placeholder="חפשי ברכה או מברך..." class="w-full bg-white/10 border border-white/20 text-white placeholder-white/60 text-sm rounded-xl py-2 px-10 focus:outline-none focus:ring-2 focus:ring-white/40">
                <i class="fa-solid fa-magnifying-glass absolute right-3.5 top-3 text-white/60 text-sm"></i>
            </div>
            
            <div class="flex items-center gap-2 bg-white/15 backdrop-blur-md border border-white/25 px-5 py-2.5 rounded-2xl text-sm text-white shadow-lg shrink-0">
                <div class="flex items-center gap-2 border-l border-white/20 pl-4">
                    <i class="fa-solid fa-sticky-note text-yellow-300 text-base"></i>
                    <span id="noteCount" class="font-bold text-lg">0</span> פתקיות
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-heart text-rose-300 text-base"></i>
                    <span id="totalReactions" class="font-bold text-lg">0</span> תגובות
                </div>
            </div>
        </div>
    </header>

    <!-- Sandbox Mode Badge (Only displays when simulating locally to assure the user) -->
    <div id="sandboxBanner" class="hidden bg-amber-500/10 border-b border-amber-500/20 text-amber-300 text-xs py-1.5 px-4 text-center font-normal">
        <i class="fa-solid fa-circle-info ml-1.5"></i>
        הלוח פועל כעת במצב הדמיה מקומי (מושלם לצפייה ועריכה באתר). בחיבור האמיתי במחשב הברכות יגיעו מהוואטסאפ!
    </div>

    <!-- The Grid of Sticky Notes (Darker Slate background for high contrast) -->
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <div id="boardGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 max-w-7xl mx-auto">
            <!-- Notes will be rendered dynamically here -->
        </div>
    </main>

    <!-- Board Footer -->
    <footer class="p-4 bg-slate-950/40 text-center text-xs text-slate-500 border-t border-slate-900 font-medium">
        נבנה באהבה עבור צעירי מצפה אילן • לוח ברכות דינמי מחבר ומשמח
    </footer>

    <script>
        // Color mapping for note background classes (Solid vibrant colors with glow for dark background)
        const colorClasses = {
            yellow: { bg: 'bg-amber-100 border-t-4 border-amber-400 border-x border-b border-amber-400/10 shadow-[0_0_20px_rgba(251,191,36,0.15)]', pin: 'text-red-500', rotation: '-1.5deg' },
            blue: { bg: 'bg-sky-100 border-t-4 border-sky-400 border-x border-b border-sky-400/10 shadow-[0_0_20px_rgba(56,189,248,0.15)]', pin: 'text-blue-500', rotation: '1deg' },
            pink: { bg: 'bg-rose-100 border-t-4 border-rose-400 border-x border-b border-rose-400/10 shadow-[0_0_20px_rgba(244,63,94,0.15)]', pin: 'text-rose-500', rotation: '-1deg' },
            green: { bg: 'bg-emerald-100 border-t-4 border-emerald-400 border-x border-b border-emerald-400/10 shadow-[0_0_20px_rgba(52,211,153,0.15)]', pin: 'text-emerald-500', rotation: '1.5deg' },
            purple: { bg: 'bg-purple-100 border-t-4 border-purple-400 border-x border-b border-purple-400/10 shadow-[0_0_20px_rgba(192,132,252,0.15)]', pin: 'text-violet-500', rotation: '-0.5deg' }
        };

        let greetings = [];

        // Mock greetings to show when in simulator/preview mode so the screen isn't empty
        const mockGreetings = [
            {
                id: 101,
                sender: "משפחת כהן",
                text: "עומר ודנה היקרים!\nהמון מזל טוב על החתונה המרגשת שלכם! מאחלים לכם חיים מאושרים, מלאי צחוק, אהבה, בריאות והבנה הדדית. אוהבים אתכם המון! 🎉💍❤️",
                colorKey: "yellow",
                image: "https://placehold.co/600x400/fef08a/1e293b?text=%D7%9E%D7%96%D7%9C%20%D7%98%D7%95%D7%91%20%D7%A2%D7%95%D7%9E%D7%A8%20%D7%95%D7%93%D7%A0%D7%94!",
                reactions: { heart: 14, like: 8, party: 5 },
                date: "היום, 14:15"
            },
            {
                id: 102,
                sender: "יעל",
                text: "שיר! כל הכבוד על סיום הקורס המפרך! עבדת קשה והתוצאות מדברות בעד עצמן. המון בהצלחה בהמשך הדרך, קטן עלייך! 💪🎓🎓",
                colorKey: "purple",
                image: null,
                reactions: { heart: 9, like: 12, party: 4 },
                date: "היום, 11:30"
            },
            {
                id: 103,
                sender: "איתי ותמר",
                text: "מזל טוב ענק על קבלת הרישיון המיוחל! סע בדרכים בטוחות, תהנה מהדרך ותשמור על עצמך תמיד! 🚗✨🛣️",
                colorKey: "green",
                image: null,
                reactions: { heart: 5, like: 19, party: 2 },
                date: "אתמול, 18:45"
            }
        ];

        // Helper to check if we are in simulator mode (e.g., opened as a local file or inside web preview blob)
        function isSimulatorMode() {
            return window.location.protocol === 'file:' || 
                   window.location.protocol === 'blob:' || 
                   window.location.hostname === '';
        }

        // Fetch greetings from server (with smooth fallback to simulated state)
        async function fetchGreetings() {
            if (isSimulatorMode()) {
                document.getElementById('sandboxBanner').classList.remove('hidden');
                const stored = localStorage.getItem('local_greetings');
                if (stored) {
                    greetings = JSON.parse(stored);
                } else {
                    greetings = [...mockGreetings];
                    localStorage.setItem('local_greetings', JSON.stringify(greetings));
                }
                renderBoard(greetings);
                return;
            }

            try {
                const response = await fetch('/api/greetings');
                greetings = await response.json();
                renderBoard(greetings);
            } catch (err) {
                console.warn("Express server not running locally yet. Using simulation mode.", err);
                document.getElementById('sandboxBanner').classList.remove('hidden');
                const stored = localStorage.getItem('local_greetings') || JSON.stringify(mockGreetings);
                greetings = JSON.parse(stored);
                renderBoard(greetings);
            }
        }

        // Render Greetings onto the Board Grid
        function renderBoard(itemsToRender) {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';

            let totalReacts = 0;

            if (itemsToRender.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-500">
                        <i class="fa-regular fa-folder-open text-4xl mb-3 block"></i>
                        <p class="text-base">הלוח עדיין ריק. שלחו ברכה ראשונה בוואטסאפ!</p>
                    </div>
                `;
                document.getElementById('noteCount').innerText = "0";
                document.getElementById('totalReactions').innerText = "0";
                return;
            }

            itemsToRender.forEach(note => {
                const colorConfig = colorClasses[note.colorKey] || colorClasses.yellow;
                totalReacts += note.reactions.heart + note.reactions.like + note.reactions.party;

                // Create Card element
                const card = document.createElement('div');
                card.className = `sticky-note ${colorConfig.bg} rounded-xl p-5 relative flex flex-col justify-between min-h-[220px] select-none border-b border-black/5`;
                card.style.transform = `rotate(${colorConfig.rotation})`;

                card.innerHTML = `
                    <!-- Pushpin decorative icon at the top -->
                    <div class="absolute -top-3.5 left-1/2 transform -translate-x-1/2 z-10">
                        <i class="fa-solid fa-thumbtack ${colorConfig.pin} text-2xl drop-shadow-md"></i>
                    </div>

                    <!-- Note Content & Subdued Sender info -->
                    <div class="mb-4 flex-1 flex flex-col justify-between">
                        <div>
                            <!-- Optional Image in note -->
                            ${note.image ? `
                                <div class="w-full h-36 overflow-hidden rounded-lg mb-3 shadow-inner">
                                    <img src="${note.image}" class="w-full h-full object-cover pointer-events-none" alt="ברכה" onerror="this.parentElement.style.display='none'">
                                </div>
                            ` : ''}
                            <p class="text-slate-800 leading-relaxed text-[15px] font-normal whitespace-pre-line">${note.text}</p>
                        </div>
                        
                        <!-- Clean, un-emphasized Sender & Date alignment at the bottom-corner of content -->
                        <div class="flex items-center justify-between text-[11px] text-slate-500/80 mt-3 border-t border-black/5 pt-2 font-normal">
                            <span>מאת: ${note.sender}</span>
                            <span>${note.date}</span>
                        </div>
                    </div>

                    <!-- Reactions and Actions -->
                    <div class="border-t border-black/5 pt-3 mt-auto flex items-center justify-between">
                        <div class="flex gap-2">
                            <button onclick="addReaction(${note.id}, 'heart')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-rose-600 transition-all shadow-sm active:scale-90">
                                ❤️ <span class="text-slate-700 font-bold">${note.reactions.heart}</span>
                            </button>
                            <button onclick="addReaction(${note.id}, 'like')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-amber-600 transition-all shadow-sm active:scale-90">
                                👍 <span class="text-slate-700 font-bold">${note.reactions.like}</span>
                            </button>
                            <button onclick="addReaction(${note.id}, 'party')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-white/70 hover:bg-white text-xs font-semibold text-purple-600 transition-all shadow-sm active:scale-90">
                                🎉 <span class="text-slate-700 font-bold">${note.reactions.party}</span>
                            </button>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            // Update stats
            document.getElementById('noteCount').innerText = itemsToRender.length;
            document.getElementById('totalReactions').innerText = totalReacts;
        }

        // Add Reaction (works with local storage in preview, and API in live)
        async function addReaction(noteId, reactionType) {
            if (isSimulatorMode()) {
                greetings = greetings.map(note => {
                    if (note.id === noteId) {
                        note.reactions[reactionType]++;
                    }
                    return note;
                });
                localStorage.setItem('local_greetings', JSON.stringify(greetings));
                renderBoard(greetings);
                return;
            }

            try {
                const response = await fetch(`/api/greetings/${noteId}/react`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: reactionType })
                });
                if (response.ok) {
                    fetchGreetings();
                }
            } catch (err) {
                console.error("Error adding reaction:", err);
            }
        }

        // Search Filter Logic
        function filterNotes() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) {
                renderBoard(greetings);
                return;
            }
            const filtered = greetings.filter(note => 
                note.sender.toLowerCase().includes(query) || 
                note.text.toLowerCase().includes(query)
            );
            renderBoard(filtered);
        }

        // Poll server for live updates every 3 seconds (only if not in simulator mode)
        if (!isSimulatorMode()) {
            setInterval(fetchGreetings, 3000);
        }

        // Initial Load
        window.onload = fetchGreetings;
    </script>
</body>
</html>
